<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <span>Etapas</span>
        <div class="d-flex gap-2">
            <a class="btn btn-sm btn-outline-secondary"
                href="{% url 'gestaoobras:obras_etapas_list' slug=slug obra_id=obra.id %}">Ver todos</a>
            <a class="btn btn-sm btn-primary"
                href="{% url 'gestaoobras:obras_etapas_create' slug=slug obra_id=obra.id %}">Nova</a>
        </div>
    </div>
    <div class="card-body p-0">
        <div class="table-scroll">
            <table class="table table-sm mb-0">
                <thead>
                    <tr>
                        <th>Cód</th>
                        <th>Nome</th>
                        <th>Previsão</th>
                        <th>Situação</th>
                        <th>%</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    {% for e in etapas %}
                    <tr>
                        <td>{{ e.etap_codi }}</td>
                        <td>{{ e.etap_nome }}</td>
                        <td>
                            {% if e.etap_dfip %}
                            <span class="js-deadline" data-deadline="{{ e.etap_dfip|date:'Y-m-d' }}"
                                data-deadline-done="{% if e.etap_situ == 'FI' %}1{% else %}0{% endif %}">
                                {{ e.etap_dfip|date:'d/m/Y' }}
                            </span>
                            {% else %}
                            -
                            {% endif %}
                        </td>
                        <td>{{ e.get_etap_situ_display }}</td>
                        <td>{{ e.etap_perc }}</td>
                        <td class="text-end">
                            <a class="btn btn-sm btn-outline-primary"
                                href="{% url 'gestaoobras:obras_etapas_edit' slug=slug obra_id=obra.id etapa_id=e.id %}">Editar</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="6" class="text-center text-muted py-3">Sem etapas</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
