<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <span>Processos (últimos)</span>
        <div class="d-flex gap-2">
            <a class="btn btn-sm btn-outline-secondary"
                href="{% url 'gestaoobras:obras_processos_list' slug=slug obra_id=obra.id %}">Ver todos</a>
            <a class="btn btn-sm btn-primary"
                href="{% url 'gestaoobras:obras_processos_create' slug=slug obra_id=obra.id %}">Novo</a>
        </div>
    </div>
    <div class="card-body p-0">
        <div class="table-scroll">
            <table class="table table-sm mb-0">
                <thead>
                    <tr>
                        <th>Cód</th>
                        <th>Título</th>
                        <th>Data</th>
                        <th>Status</th>
                        <th>Resp</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in processos %}
                    <tr>
                        <td>{{ p.proc_codi }}</td>
                        <td>{{ p.proc_titu }}</td>
                        <td>
                            {% if p.proc_dlim %}
                            <span class="js-deadline" data-deadline="{{ p.proc_dlim|date:'Y-m-d' }}"
                                data-deadline-done="{% if p.proc_stat == 'CO' %}1{% else %}0{% endif %}">
                                {{ p.proc_dlim|date:'d/m/Y' }}
                            </span>
                            {% else %}
                            -
                            {% endif %}
                        </td>
                        <td>{{ p.get_proc_stat_display }}</td>
                        <td>{{ p.proc_resp }}</td>
                        <td class="text-end">
                            <a class="btn btn-sm btn-outline-primary"
                                href="{% url 'gestaoobras:obras_processos_edit' slug=slug obra_id=obra.id processo_id=p.id %}">Editar</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="6" class="text-center text-muted py-3">Sem processos</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
