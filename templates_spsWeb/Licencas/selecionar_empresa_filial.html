{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
  .login-wrapper {
    padding: 1rem;
  }

  .login-card {
    max-width: 740px;
    box-shadow: 0 2px 20px rgba(204, 230, 252, 0.4);
  }

  .login-spinner {
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255, 255, 255, .35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  /* tabela */
  .table-select {
    border: 1px solid var(--bs-border-color);
    border-radius: 10px;
    overflow: hidden;
    max-height: 230px;
    overflow-y: auto;
  }

  .table-row {
    display: flex;
    padding: 10px 12px;
    gap: 10px;
    border-bottom: 1px solid var(--bs-border-color);
    cursor: pointer;
    font-size: 13px;
  }

  .table-row:hover {
    background: rgba(25, 135, 84, .08);
  }

  .table-row.active {
    background: rgba(25, 135, 84, .18);
  }

  .table-header {
    font-weight: 700;
    background: rgba(108, 117, 125, .12);
    cursor: default;
  }

  .col {
    flex: 1;
  }

  .col-empresa {
    flex: 1.6;
  }
</style>

<div class="login-wrapper container d-flex justify-content-center">
  <div class="login-card w-100 bg-body border rounded-3">

    <div class="p-4 text-center">
      <h5>Seleção de Empresa e Filial</h5>
      <small class="text-muted">Escolha para continuar</small>
    </div>

    <div class="p-4">

      <form id="selForm" method="post" action="/web/selecionar-empresa/">
        {% csrf_token %}

        <input type="hidden" id="slugInput" name="slug">
        <input type="hidden" id="empresaIdInput" name="empresa_id">
        <input type="hidden" id="filialIdInput" name="filial_id">

        <input type="hidden" id="empresaNomeInput" name="empresa_nome">
        <input type="hidden" id="empresaRazaoInput" name="empresa_razao">
        <input type="hidden" id="empresaFantasiaInput" name="empresa_fantasia">

        <input type="hidden" id="filialNomeInput" name="filial_nome">
        <input type="hidden" id="filialFantasiaInput" name="filial_fantasia">

        <!-- EMPRESA -->
        <h6>Empresa</h6>
        <div id="empresa-list" class="table-select mb-4">
          <div class="table-row table-header">
            <div class="col col-empresa">Empresa</div>
            <div class="col">Fantasia</div>
            <div class="col">Documento</div>
          </div>
        </div>

        <!-- FILIAL -->
        <h6>Filial</h6>
        <div id="filial-list" class="table-select mb-4">
          <div class="table-row table-header">
            <div class="col col-empresa">Filial</div>
            <div class="col">Fantasia</div>
            <div class="col">Documento</div>
          </div>
        </div>

        <button type="submit" class="btn btn-success w-100">
          Continuar
        </button>

      </form>
    </div>
  </div>
</div>

<script>
let empresaSel = null;
let filialSel = null;
let isLoading = false;

const DEBUG = true;
const L = {
  log: (...a) => DEBUG && console.log('[SEL_EMP]', ...a),
  warn: (...a) => DEBUG && console.warn('[SEL_EMP]', ...a),
  error: (...a) => DEBUG && console.error('[SEL_EMP]', ...a),
};

const slug = localStorage.getItem('slug');
const access = localStorage.getItem('access');

const form = document.getElementById('selForm');
const submitBtn = form.querySelector('button[type="submit"]');

function setLoading(loading) {
  isLoading = loading;
  submitBtn.disabled = loading;
  submitBtn.textContent = loading ? 'Carregando...' : 'Continuar';
}

function showError(msg) {
  alert(msg);
  setLoading(false);
}

const authFetch = async (url, options = {}) => {
  const empresa = localStorage.getItem('empresa_id') || '1';
  const filial = localStorage.getItem('filial_id') || '1';

  const makeHeaders = (token) => ({
    Authorization: token ? `Bearer ${token}` : '',
    'Content-Type': 'application/json',
    'X-Empresa': empresa,
    'X-Filial': filial,
    ...(options.headers || {})
  });

  let resp = await fetch(url, {
    ...options,
    credentials: 'same-origin',
    headers: makeHeaders(localStorage.getItem('access'))
  });

  if (resp.status !== 401) return resp;

  const refresh = localStorage.getItem('refresh');
  if (!refresh) return resp;

  const refreshResp = await fetch(`/api/${slug}/auth/token/refresh/`, {
    method: 'POST',
    credentials: 'same-origin',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ refresh })
  });

  if (!refreshResp.ok) return resp;

  const data = await refreshResp.json();
  if (!data.access) return resp;

  localStorage.setItem('access', data.access);

  return fetch(url, {
    ...options,
    credentials: 'same-origin',
    headers: makeHeaders(data.access)
  });
};

function hydrateUserHidden() {
  const usuaCodiInput = document.getElementById('usuaCodiInput');
  const usuaNomeInput = document.getElementById('usuaNomeInput');

  if (!usuaCodiInput || !usuaNomeInput) return;

  try {
    const raw = localStorage.getItem('usuario');
    const usuario = raw ? JSON.parse(raw) : {};

    usuaCodiInput.value =
      usuario?.usua_codi ||
      usuario?.usuario_id ||
      usuario?.id ||
      localStorage.getItem('usua_codi') ||
      '';

    usuaNomeInput.value =
      usuario?.usua_nome ||
      usuario?.username ||
      localStorage.getItem('usua_nome') ||
      '';
  } catch {
    usuaCodiInput.value = localStorage.getItem('usua_codi') || '';
    usuaNomeInput.value = localStorage.getItem('usua_nome') || '';
  }
}

async function carregarEmpresas() {
  const resp = await authFetch(`/api/${slug}/licencas/empresas/`);
  const data = await resp.json();

  if (!resp.ok) return showError(data?.error || 'Erro ao carregar empresas');

  const box = document.getElementById('empresa-list');

  data.forEach(e => {
    const row = document.createElement('div');
    row.className = 'table-row';

    row.innerHTML = `
      <div class="col col-empresa">${e.empr_nome || ''}</div>
      <div class="col">${e.empr_fant || ''}</div>
      <div class="col">${e.empr_docu || e.empr_cnpj || ''}</div>
    `;

    row.onclick = () => {
      document.querySelectorAll('#empresa-list .table-row').forEach(r => r.classList.remove('active'));
      row.classList.add('active');

      empresaSel = e;
      filialSel = null;

      carregarFiliais(e.empr_codi);
    };

    box.appendChild(row);
  });
}

async function carregarFiliais(empresaId) {
  const resp = await authFetch(`/api/${slug}/licencas/filiais/?empresa_id=${encodeURIComponent(empresaId)}`);
  const data = await resp.json();

  if (!resp.ok) return showError(data?.error || 'Erro ao carregar filiais');

  const box = document.getElementById('filial-list');

  box.innerHTML = `
    <div class="table-row table-header">
      <div class="col col-empresa">Filial</div>
      <div class="col">Fantasia</div>
      <div class="col">Documento</div>
    </div>
  `;

  data.forEach(f => {
    const row = document.createElement('div');
    row.className = 'table-row';

    row.innerHTML = `
      <div class="col col-empresa">${f.empr_nome || ''}</div>
      <div class="col">${f.empr_fant || ''}</div>
      <div class="col">${f.empr_cnpj || f.empr_docu || ''}</div>
    `;

    row.onclick = () => {
      document.querySelectorAll('#filial-list .table-row').forEach(r => r.classList.remove('active'));
      row.classList.add('active');

      filialSel = f;
    };

    box.appendChild(row);
  });
}

form.addEventListener('submit', e => {
  if (isLoading) {
    e.preventDefault();
    return;
  }

  setLoading(true);

  if (!empresaSel || !filialSel) {
    e.preventDefault();
    showError('Selecione empresa e filial.');
    return;
  }

  if (String(filialSel.empr_empr) !== String(empresaSel.empr_codi)) {
    e.preventDefault();
    showError('Filial não pertence à empresa selecionada.');
    return;
  }

  localStorage.setItem('empresa_id', String(empresaSel.empr_codi));
  localStorage.setItem('filial_id', String(filialSel.empr_codi));
  localStorage.setItem('empresa_nome', empresaSel.empr_nome || '');
  localStorage.setItem('filial_nome', filialSel.empr_nome || '');
  localStorage.setItem('empresa_fantasia', empresaSel.empr_fant || '');
  localStorage.setItem('filial_fantasia', filialSel.empr_fant || '');

  document.getElementById('slugInput').value = slug || '';
  document.getElementById('empresaIdInput').value = empresaSel.empr_codi || '';
  document.getElementById('filialIdInput').value = filialSel.empr_codi || '';

  document.getElementById('empresaNomeInput').value = empresaSel.empr_nome || '';
  document.getElementById('empresaRazaoInput').value = empresaSel.empr_nome || '';
  document.getElementById('empresaFantasiaInput').value = empresaSel.empr_fant || '';

  document.getElementById('filialNomeInput').value = filialSel.empr_nome || '';
  document.getElementById('filialFantasiaInput').value = filialSel.empr_fant || '';

  hydrateUserHidden();
});

if (!slug || !access) {
  window.location.href = '/web/login/';
} else {
  hydrateUserHidden();
  carregarEmpresas();
}
</script>

{% endblock %}
