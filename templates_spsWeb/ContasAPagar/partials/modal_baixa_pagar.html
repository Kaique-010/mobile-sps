<style>
  .modal-content {
    padding: 24px;
    background-color: #000000;
  }

  .modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
</style>

<div id="modal-baixa" class="modal-overlay">
  <div class="modal-content">
    <h5>Baixa de Título (Pagamento)</h5>
    <form id="form-baixa">
      <div class="modal-grid">
        <div>
          <label>Data do Pagamento *</label>
          <input id="data_pagamento" type="date" />
        </div>
        <div>
          <label>Valor Pago *</label>
          <input id="valor_pago" type="number" step="0.01" />
        </div>
        <div>
          <label>Juros</label>
          <input id="valor_juros" type="number" step="0.01" />
        </div>
        <div>
          <label>Multa</label>
          <input id="valor_multa" type="number" step="0.01" />
        </div>
        <div>
          <label>Desconto</label>
          <input id="valor_desconto" type="number" step="0.01" />
        </div>
        <div class="full">
          <label>Histórico</label>
          <input id="historico" type="text" />
        </div>
        <div>
          <label>Banco</label>
          <div class="position-relative">
            <input id="banco-display" type="text" autocomplete="off"
              placeholder="Digite o código ou nome do banco..." />
          </div>
          <input id="banco" type="hidden" />
        </div>
        <div>
          <label>Cheque (nº)</label>
          <input id="cheque" type="number" />
        </div>
        <div class="full">
          <label>Centro de Custo</label>
          <div class="position-relative">
            <input id="centro_custo-display" type="text" autocomplete="off" placeholder="Digite o código ou nome..." />
          </div>
          <input id="centro_custo" type="hidden" />
        </div>
        <div class="full">
          <label>Forma de Pagamento</label>
          <select id="forma_pagamento">
            <option value="B">Banco</option>
            <option value="O">Outros</option>
            <option value="C">Cheque</option>
            <option value="D">Devolução</option>
            <option value="A">Adiantamento</option>
          </select>
        </div>
      </div>
    </form>
    <div class="modal-actions">
      <button id="btn-cancelar-baixa" type="button" class="btn btn-secondary btn-sm">Cancelar</button>
      <button id="btn-confirmar-baixa" type="button" class="btn btn-success btn-sm">Confirmar</button>
    </div>
  </div>
</div>

<script>
  (function () {
    const inputBanco = document.getElementById('banco-display');
    const hiddenBanco = document.getElementById('banco');

    if (!inputBanco || !hiddenBanco) return;

    let ddBanco = null;
    let controllerBanco = null;

    function parseCodigo(value) {
      const s = (value || '').toString().trim();
      const m = s.match(/^(\d+)/);
      if (!m) return null;
      const n = parseInt(m[1], 10);
      return isNaN(n) ? null : n;
    }

    function dropdownBanco() {
      if (ddBanco) return ddBanco;
      ddBanco = document.createElement('div');
      ddBanco.className = 'list-group position-absolute w-100';
      ddBanco.style.marginTop = '4px';
      inputBanco.parentElement.appendChild(ddBanco);
      return ddBanco;
    }

    let bancoDebounceId = null;
    inputBanco.addEventListener('input', function () {
      clearTimeout(bancoDebounceId);
      bancoDebounceId = setTimeout(async () => {
        const term = inputBanco.value.trim();
        if (term.length < 2) {
          if (!term) hiddenBanco.value = '';
          if (ddBanco) ddBanco.innerHTML = '';
          return;
        }

        try {
          if (controllerBanco) controllerBanco.abort();
          controllerBanco = new AbortController();

          const url = `/web/{{ slug }}/contas-a-pagar/autocomplete/bancos/?q=${encodeURIComponent(term)}`;
          const resp = await fetch(url, { signal: controllerBanco.signal });
          const data = await resp.json();
          const results = data.results || [];
          const d = dropdownBanco();
          d.innerHTML = '';

          if (results.length === 0) {
            const empty = document.createElement('div');
            empty.className = 'list-group-item text-muted';
            empty.textContent = 'Nenhum banco encontrado';
            d.appendChild(empty);
            return;
          }

          results.forEach(it => {
            const a = document.createElement('a');
            a.href = '#';
            a.className = 'list-group-item list-group-item-action';
            a.textContent = it.text || it.id || '';
            a.addEventListener('click', ev => {
              ev.preventDefault();
              hiddenBanco.value = it.id || '';
              inputBanco.value = it.text || it.id || '';
              d.innerHTML = '';
            });
            d.appendChild(a);
          });
        } catch (e) {
          if (e.name !== 'AbortError') {
            console.error('Erro ao buscar bancos (pagar):', e);
          }
        }
      }, 250);
    });

    inputBanco.addEventListener('change', () => {
      const code = parseCodigo(inputBanco.value);
      hiddenBanco.value = code !== null ? String(code) : '';
    });

    document.addEventListener('click', (ev) => {
      if (ddBanco && !inputBanco.parentElement.contains(ev.target)) {
        ddBanco.innerHTML = '';
      }
    });
  })();

  (function () {
    const inputCC = document.getElementById('centro_custo-display');
    const hiddenCC = document.getElementById('centro_custo');

    if (!inputCC || !hiddenCC) return;

    let ddCC = null;
    let controllerCC = null;

    function parseCodigo(value) {
      const s = (value || '').toString().trim();
      const m = s.match(/^(\d+)/);
      if (!m) return null;
      const n = parseInt(m[1], 10);
      return isNaN(n) ? null : n;
    }

    function dropdownCC() {
      if (ddCC) return ddCC;
      ddCC = document.createElement('div');
      ddCC.className = 'list-group position-absolute w-100';
      ddCC.style.marginTop = '4px';
      inputCC.parentElement.appendChild(ddCC);
      return ddCC;
    }

    let ccDebounceId = null;
    inputCC.addEventListener('input', function () {
      clearTimeout(ccDebounceId);
      ccDebounceId = setTimeout(async () => {
        const term = inputCC.value.trim();
        if (!term) {
          hiddenCC.value = '';
          if (ddCC) ddCC.innerHTML = '';
          return;
        }
        if (term.length < 1) {
          if (ddCC) ddCC.innerHTML = '';
          return;
        }

        try {
          if (controllerCC) controllerCC.abort();
          controllerCC = new AbortController();

          const url = `/web/{{ slug }}/contas-a-pagar/autocomplete/centrodecustos/?q=${encodeURIComponent(term)}`;
          const resp = await fetch(url, { signal: controllerCC.signal });
          const data = await resp.json();
          const results = data.results || [];
          const d = dropdownCC();
          d.innerHTML = '';

          if (results.length === 0) {
            const empty = document.createElement('div');
            empty.className = 'list-group-item text-muted';
            empty.textContent = 'Nenhum centro de custo encontrado';
            d.appendChild(empty);
            return;
          }

          results.forEach(it => {
            const a = document.createElement('a');
            a.href = '#';
            a.className = 'list-group-item list-group-item-action';
            a.textContent = it.label || it.value || '';
            a.addEventListener('click', ev => {
              ev.preventDefault();
              hiddenCC.value = it.value || '';
              inputCC.value = it.label || it.value || '';
              d.innerHTML = '';
            });
            d.appendChild(a);
          });
        } catch (e) {
          if (e.name !== 'AbortError') {
            console.error('Erro ao buscar centro de custo (pagar):', e);
          }
        }
      }, 250);
    });

    inputCC.addEventListener('change', () => {
      const code = parseCodigo(inputCC.value);
      hiddenCC.value = code !== null ? String(code) : '';
    });

    document.addEventListener('click', (ev) => {
      if (ddCC && !inputCC.parentElement.contains(ev.target)) {
        ddCC.innerHTML = '';
      }
    });
  })();
</script>
