{% extends 'transportes/base_cte.html' %}

{% block title %}Excluir Regra{% endblock %}

{% block cte_content %}
<div class="card shadow-sm mb-4">
    <div class="card-header bg-danger text-white">
        <h5 class="mb-0">Excluir Regra</h5>
    </div>
    <div class="card-body">
        <p>Tem certeza que deseja excluir a regra para <strong>{{ object.uf_origem }} -> {{ object.uf_destino }}</strong>?</p>
        <p class="text-danger">Esta ação não pode ser desfeita.</p>
        
        <form method="post">
            {% csrf_token %}
            <div class="d-flex justify-content-end gap-2">
                <a href="{% url 'transportes:regra_list' slug=slug %}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-danger">Confirmar Exclusão</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
