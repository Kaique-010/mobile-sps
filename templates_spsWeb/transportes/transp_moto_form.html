{% extends 'transportes/base_cte.html' %}

{% block title %}{{ titulo }}{% endblock %}

{% block cte_content %}
<div class="container-fluid">
  <div class="card shadow-sm">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h5 class="mb-0">{{ titulo }}</h5>
      <a href="{% url 'transportes:transportadoras_motoristas_lista' slug=slug %}" class="btn btn-outline-secondary btn-sm">
        Voltar
      </a>
    </div>
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        <div class="row g-3">
          {% for field in form %}
            <div class="col-md-4">
              <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
              {{ field }}
              {% if field.errors %}<div class="text-danger small">{{ field.errors|join:', ' }}</div>{% endif %}
            </div>
          {% endfor %}
        </div>
        <div class="mt-3">
          <button class="btn btn-primary" type="submit">Salvar alterações</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
