<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Voice Agents</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 760px; margin: 2rem auto; }
      .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
      button { padding: 0.5rem 0.8rem; margin-right: 0.5rem; }
      #log { white-space: pre-wrap; background: #fafafa; border: 1px solid #ddd; padding: 1rem; }
    </style>
  </head>
  <body>
    <h1>Leitura de Partitura + Canto SATB</h1>

    <div class="card">
      <h3>1) Upload da partitura</h3>
      <input id="scoreFile" type="file" />
      <button onclick="uploadScore()">Upload</button>
    </div>

    <div class="card">
      <h3>2) Analisar / separar vozes</h3>
      <button onclick="analyzeScore()">Analisar</button>
      <p>score_id: <span id="scoreId">-</span></p>
      <p>vozes: <span id="voices">-</span></p>
    </div>

    <div class="card">
      <h3>3) Cantar voz selecionada</h3>
      <select id="voiceSelect"></select>
      <button onclick="singVoice()">Gerar áudio</button>
      <p id="audioPath"></p>
    </div>

    <h3>Log</h3>
    <div id="log"></div>

    <script>
      let scoreId = null;

      function log(msg) {
        const el = document.getElementById('log');
        el.textContent = `${msg}\n${el.textContent}`;
      }

      async function uploadScore() {
        const fileInput = document.getElementById('scoreFile');
        const file = fileInput.files[0];
        if (!file) return log('Selecione um arquivo primeiro.');

        const fd = new FormData();
        fd.append('file', file);
        const res = await fetch('/api/scores/upload', { method: 'POST', body: fd });
        const data = await res.json();
        scoreId = data.score_id;
        document.getElementById('scoreId').textContent = scoreId;
        log(`Upload concluído: ${JSON.stringify(data)}`);
      }

      async function analyzeScore() {
        if (!scoreId) return log('Faça o upload antes.');
        const res = await fetch(`/api/scores/${scoreId}/analyze`, { method: 'POST' });
        const data = await res.json();
        document.getElementById('voices').textContent = data.voices.join(', ');

        const select = document.getElementById('voiceSelect');
        select.innerHTML = '';
        data.voices.forEach((voice) => {
          const opt = document.createElement('option');
          opt.value = voice;
          opt.textContent = voice;
          select.appendChild(opt);
        });

        log(`Análise concluída: ${JSON.stringify(data)}`);
      }

      async function singVoice() {
        if (!scoreId) return log('Faça o upload e análise antes.');
        const voice = document.getElementById('voiceSelect').value;
        const res = await fetch(`/api/scores/${scoreId}/sing`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ voice }),
        });
        const data = await res.json();
        document.getElementById('audioPath').textContent = `Áudio: ${data.audio_path}`;
        log(`Áudio gerado: ${JSON.stringify(data)}`);
      }
    </script>
  </body>
</html>
